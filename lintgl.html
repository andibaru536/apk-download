    <style>
        /* --- FONTS & RESET --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 0%, #1a1400 0%, #050505 60%), /* Glow atas */
                linear-gradient(to bottom, #050505, #000);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- DECORATION (Background Lights) --- */
        .bg-light {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.05);
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .bg-1 { top: -100px; left: -100px; }
        .bg-2 { bottom: 100px; right: -100px; background: rgba(255, 0, 0, 0.05); }

        /* --- CONTAINER --- */
        .app-container {
            position: relative;
            z-index: 1;
            padding: 0 15px 100px;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .avatar-frame {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
        }
        
        /* Cincin Emas Berputar */
        .avatar-frame::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #FFD700, #000, #FFD700);
            animation: spin 4s linear infinite;
            z-index: -1;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #050505;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .brand-name {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            letter-spacing: 1px;
        }

        /* --- BUTTON LOGIN / DAFTAR (SPLASHY) --- */
        .hero-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-hero {
            position: relative;
            padding: 16px 10px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            text-decoration: none;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        
        .btn-hero:active { transform: scale(0.96); }

        .btn-login {
            background: linear-gradient(135deg, #FFD700 0%, #FF8C00 100%);
            color: #000;
            border: none;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .btn-daftar {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
        }

        /* --- MENU GRID (KIRI KANAN) --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card-item {
            position: relative;
            background: linear-gradient(160deg, #1a1a1a 0%, #0f0f0f 100%);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #fff;
            height: 140px; /* Tinggi seragam */
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        /* Shine Effect di Card */
        .card-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }
        .card-item:hover::after, .card-item:active::after {
            left: 150%;
        }

        .card-item:active {
            border-color: #FFD700;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2);
        }

        .icon-wrapper {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .icon-wrapper svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            z-index: 2;
        }

        /* Warna Ikon Spesifik */
        .icon-gold { background: linear-gradient(135deg, #FFD700, #FF8C00); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        .icon-blue { background: linear-gradient(135deg, #00c6ff, #0072ff); box-shadow: 0 0 15px rgba(0, 114, 255, 0.3); }
        .icon-pink { background: linear-gradient(135deg, #f857a6, #ff5858); box-shadow: 0 0 15px rgba(248, 87, 166, 0.3); }
        .icon-purple { background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 0 15px rgba(118, 75, 162, 0.3); }
        .icon-green { background: linear-gradient(135deg, #11998e, #38ef7d); box-shadow: 0 0 15px rgba(56, 239, 125, 0.3); }
        .icon-red { background: linear-gradient(135deg, #ED213A, #93291E); box-shadow: 0 0 15px rgba(237, 33, 58, 0.3); }


        /* --- BOTTOM NAVIGATION (FLOATING) --- */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 70px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 99;
            padding: 0 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .nav-item.active {
            color: #FFD700;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-bottom: 4px;
        }

        /* Tombol Tengah (VIP) */
        .nav-center {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -35px; /* Naik ke atas */
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.6);
            position: relative;
            z-index: 100;
        }
        
        .nav-center svg {
            fill: #000;
            width: 30px;
            height: 30px;
            margin: 0;
        }

        /* Animasi Putar Cincin */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Animasi Masuk */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUpAnim 0.6s forwards ease-out;
        }
        
        @keyframes fadeUpAnim {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CUSTOM SNOWFLAKE STYLING (Optimized) --- */
        .snowflake {
            color: #fff;
            font-size: 1em;
            font-family: Arial, sans-serif;
            text-shadow: 0 0 5px #000;
            background: transparent;
            opacity: 1;
        }

        @-webkit-keyframes snowflakes-fall{0%{top:-10%}100%{top:100%}}
        @-webkit-keyframes snowflakes-shake{0%,100%{-webkit-transform:translateX(0);transform:translateX(0)}50%{-webkit-transform:translateX(80px);transform:translateX(80px)}}
        @keyframes snowflakes-fall{0%{top:-10%}100%{top:100%}}
        @keyframes snowflakes-shake{0%,100%{transform:translateX(0)}50%{transform:translateX(80px)}}
        
        .snowflake{
            position:fixed;
            top:-10%;
            z-index:9999;
            -webkit-user-select:none;
            -moz-user-select:none;
            -ms-user-select:none;
            user-select:none;
            cursor:default;
            /* Optimasi: pointer-events: none agar gambar tidak menghalangi klik tombol */
            pointer-events: none;
            -webkit-animation-name:snowflakes-fall,snowflakes-shake;
            -webkit-animation-duration:10s,3s;
            -webkit-animation-timing-function:linear,ease-in-out;
            -webkit-animation-iteration-count:infinite,infinite;
            -webkit-animation-play-state:running,running;
            animation-name:snowflakes-fall,snowflakes-shake;
            animation-duration:10s,3s;
            animation-timing-function:linear,ease-in-out;
            animation-iteration-count:infinite,infinite;
            animation-play-state:running,running
        }
        
        .snowflake:nth-of-type(0){left:1%;-webkit-animation-delay:0s,0s;animation-delay:0s,0s}
        .snowflake:nth-of-type(1){left:10%;-webkit-animation-delay:1s,1s;animation-delay:1s,1s}
